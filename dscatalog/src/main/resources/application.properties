############################################################
# PERFIL ATIVO DA APLICAÇÃO
############################################################

# Define o profile ativo do Spring.
# Caso a variável de ambiente APP_PROFILE não esteja definida,
# o profile padrão será "test".
spring.profiles.active=${APP_PROFILE:test}


############################################################
# CONFIGURAÇÕES JPA
############################################################

# Desabilita o Open Session in View.
# Boa prática para evitar consultas fora do contexto transacional
# e prevenir problemas de LazyInitializationException mascarados.
spring.jpa.open-in-view=false


############################################################
# CONFIGURAÇÕES OAUTH2
############################################################

# Client ID utilizado para autenticação OAuth2.
# Pode ser sobrescrito via variável de ambiente CLIENT_ID.
security.oauth2.client.client-id=${CLIENT_ID:dscatalog}

# Client Secret utilizado para autenticação OAuth2.
# Pode ser sobrescrito via variável de ambiente CLIENT_SECRET.
security.oauth2.client.client-secret=${CLIENT_SECRET:dscatalog123}


############################################################
# CONFIGURAÇÕES JWT
############################################################

# Chave secreta utilizada para assinatura do token JWT.
# Recomenda-se definir via variável de ambiente em produção.
jwt.secret=${JWT_SECRET:MY-JWT-SECRET}

jwt.days-to-expire=${JWT_DAYS_TO_EXPIRE:10}

# Duração do token JWT em segundos
jwt.duration=${JWT_DURATION:86400}


############################################################
# CONFIGURAÇÕES DE CHAVES RSA PARA JWT
############################################################

# Caminho para o arquivo da chave privada RSA
jwt.private-key-path=keys/private_key.pem

# Caminho para o arquivo da chave pública RSA
jwt.public-key-path=keys/public_key.pem

# ID da chave
jwt.key-id=${JWT_KEY_ID:my-key-id}


############################################################
# CONFIGURAÇÕES AWS S3
############################################################

# Access Key ID do usuário IAM.
# Deve ser configurado via variável de ambiente AWS_KEY em produção.
aws.access_key_id=${AWS_KEY:empty}

# Secret Access Key do usuário IAM.
# Deve ser configurado via variável de ambiente AWS_SECRET em produção.
aws.secret_access_key=${AWS_SECRET:empty}

# Nome do bucket S3 utilizado para armazenamento de arquivos.
# Deve ser configurado via variável de ambiente DSCATALOG_BUCKET_NAME.
s3.bucket=${DSCATALOG_BUCKET_NAME:empty}

# Região AWS onde o bucket está provisionado.
# Exemplo: sa-east-1, us-east-1, etc.
s3.region=${DSCATALOG_BUCKET_REGION:sa-east-1}


############################################################
# CONFIGURAÇÕES DE UPLOAD DE ARQUIVO
############################################################

# Tamanho máximo permitido por arquivo enviado.
# Valor padrão: 10MB.
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}

# Tamanho máximo total da requisição multipart.
# Utiliza a mesma variável de ambiente para manter consistência.
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE:10MB}